services:
  notifier:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  sentinel:
    build: .
    command: ["python", "-m", "workflow_orchestration_queue.sentinel.poller"]
    env_file:
      - .env
    depends_on:
      notifier:
        condition: service_healthy
